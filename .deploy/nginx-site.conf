# Client beacon lines: timestamp, message (URL-encoded), user agent.
log_format clientlog '[$time_local] "$arg_m" "$http_user_agent"';

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # SSO cookies scoped to .thealvernaz.space are sent to this subdomain too;
    # the stock 8k buffers overflow on the accumulated oauth2-proxy/Keycloak
    # session, producing "400 Request Header Or Cookie Too Large".
    large_client_header_buffers 8 64k;
    client_header_buffer_size 64k;

    root /usr/share/nginx/html;
    # Accessible screen-reader build is the front door; /index.html is the standard UI.
    index ScreenReader.html index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Client error beacon (see client-log.js). Message travels in the query string because
    # nginx can log that without proxying; the body of a POST would be discarded unread.
    location = /log {
        access_log /var/log/client/client.log clientlog;
        add_header Cache-Control "no-store";
        return 204;
    }

    # HTML/JS change often during a11y iteration. no-store at origin stops
    # Cloudflare edge-caching a stale copy for up to 4h after a deploy.
    location ~* \.(?:html|js)$ {
        add_header Cache-Control "no-store, must-revalidate";
    }
}
